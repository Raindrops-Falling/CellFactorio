<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Main Menu</title>
    <link rel='stylesheet' href='main.css'>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>
<script>
class MenuScene extends Phaser.Scene {
    constructor() {
        super("MenuScene");
    }
    create() {
        this.cameras.main.setBackgroundColor("#0000FF");
        this.add.text(400, 120, "CELL GAME", {
            fontSize: "80px",
            color: "#FFFF00"
        }).setOrigin(0.5);
        this.createButton(400, 280, "Start Game", () => {
            console.log("The game has been started");
        });
        this.createButton(400, 360, "Save the Game", () => {
            console.log("This game has been saved");
        });
    }

    createButton(x, y, text, callback) {
        const btn = this.add.text(x, y, text, {
            fontSize: "40px",
            backgroundColor: "#000",
            color: "#FFFF00",
            padding: { x: 20, y: 10 }
        }).setOrigin(0.5);
        btn.setInteractive({ useHandCursor: true });
        btn.on('pointerdown', callback);
        btn.on('pointerover', () => btn.setStyle({ backgroundColor: "#333" }));
        btn.on('pointerout', () => btn.setStyle({ backgroundColor: "#000" }));

        return btn;
    }
}
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    scene: [MenuScene]
};
new Phaser.Game(config);
</script>
</body>
</html>
